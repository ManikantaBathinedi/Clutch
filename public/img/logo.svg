  <circle cx="37" cy="30" r="2.2" fill="rgba(0,0,0,0.35)"/>
  <!-- Joysticks -->
  <circle cx="24" cy="37" r="3.5" fill="rgba(0,0,0,0.25)" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
  <circle cx="38" cy="37" r="3.5" fill="rgba(0,0,0,0.25)" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
