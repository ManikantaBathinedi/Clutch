<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="clutch-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7b731"/>
      <stop offset="30%" stop-color="#ff6348"/>
      <stop offset="65%" stop-color="#e84393"/>
